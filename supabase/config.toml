# Supabase CLI config — solo lo necesario para desplegar funciones y migraciones.
project_id = "batch-cooking-pwa"

[functions.gemini-proxy]
verify_jwt = true

[functions.youtube-playlist]
verify_jwt = true

# Auth propia vía cabecera x-cron-secret (comparada contra Vault); el token
# nuevo sb_publishable_* del proyecto no es un JWT, así que el gateway no
# puede validar la llamada del cron.
[functions.send-reminders]
verify_jwt = false
